name: deep_taste
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # torch is installed separately in the cluster bootstrap so the CUDA build
      # matches PACE's driver -- see scripts/setup_env.sh.
      - pandas==3.0.3
      - pyarrow==24.0.0
      - numpy==2.5.1
      - scikit-learn==1.9.0
      - sentence-transformers==5.6.0
      - transformers==5.14.0
