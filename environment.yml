# Deliberately minimal: only the interpreter and pip.
#
# Every package here that depends on torch (sentence-transformers, transformers)
# would otherwise pull the DEFAULT PyPI torch wheel, which is currently built
# against CUDA 13 and fails on PACE's CUDA 12.9 driver. So torch is installed
# first, from a pinned CUDA index, and the rest afterwards -- see
# scripts/setup_env.sh. Do not add torch-dependent packages to this file.
name: deep_taste
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
